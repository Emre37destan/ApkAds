<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; } /* Her şeyi sıfırlar */

        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #0e1111; 
        }

        .ad-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Boşluk kalmaması için hafifçe büyütüp alanı doldurur */
        }
    </style>
</head>
<body>
    <div class="ad-container" onclick="window.open('https://github.com/Emre37destan/ApkAds', '_blank')">
        <img src="banner.png" alt="APK-MASTER 2026 PRO">
    </div>
</body>
</html>
