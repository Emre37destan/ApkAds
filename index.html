<!DOCTYPE html>
<html>
<head>
    <style>
        * { margin: 0; padding: 0; overflow: hidden; }
        body, html { width: 100%; height: 100%; background: #000; }
        .full-link {
            display: block;
            width: 100%;
            height: 100px;
            cursor: pointer;
            -webkit-user-select: none; /* Sürüklemeyi engeller */
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: fill;
            pointer-events: none; /* Resmin tıklamayı bloklamasını engeller */
        }
    </style>
</head>
<body>
    <a href="https://github.com/Emre37destan/ApkAds" class="full-link">
        <img src="banner.png" alt="APK MASTER 2026 ULTRA">
    </a>
</body>
</html>
