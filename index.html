<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #0e1111; 
        }
        .ad-container {
            width: 100vw; /* Viewport width: Ekran genişliğinin tamamı */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        img {
            width: 100%; /* Resmi yana doğru yayar */
            height: 100px;
            object-fit: cover; /* Yanlardaki boşluğu kapatmak için resmi esnetir/kırpar */
        }
    </style>
</head>
<body>
    <div class="ad-container" onclick="window.open('https://github.com/Emre37destan/ApkAds', '_blank')">
        <img src="banner.png" alt="APK-MASTER 2026 PRO">
    </div>
</body>
</html>
