<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #0e1111; 
        }
        .ad-container {
            width: 100vw; /* Ekranın tam genişliği */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        img {
            width: 100%; /* Resmi genişliğe yayar */
            height: 100%; /* Resmi yüksekliğe yayar */
            object-fit: cover; /* Resmi yamultmadan alanı doldurur, kenarları hafif kırpar */
        }
    </style>
</head>
<body>
    <div class="ad-container" onclick="window.open('https://github.com/Emre37destan/ApkAds', '_blank')">
        <img src="banner.png" alt="APK-MASTER 2026 PRO">
    </div>
</body>
</html>
