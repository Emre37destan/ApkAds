<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            /* Arka plan rengini banner'ın siyahıyla birebir aynı yaptık */
            background-color: #0e1111; 
        }
        .ad-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        img {
            /* Resmi yamultmaz veya kırpmaz, tamamını çerçeveye sığdırır */
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
        }
    </style>
</head>
<body>
    <div class="ad-container" onclick="window.open('https://github.com/Emre37destan/ApkAds', '_blank')">
        <img src="banner.png" alt="APK-MASTER 2026 PRO">
    </div>
</body>
</html>
