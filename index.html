<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            /* Arka planı resmin en koyu rengiyle aynı yapalım ki geçiş belli olmasın */
            background-color: #1a1a1a; 
        }
        .ad-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        img {
            /* Burası kritik: Resmi yamultmadan tüm genişliğe yayar,  */
            /* gerekirse üstten/alttan çok az kırpar ama boşluk bırakmaz */
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block; /* Alt kısımdaki boşlukları siler */
        }
    </style>
</head>
<body>
    <div class="ad-container" onclick="window.open('https://github.com/Emre37destan/ApkAds', '_blank')">
        <img src="banner.png" alt="APK-MASTER 2026 PRO">
    </div>
</body>
</html>
