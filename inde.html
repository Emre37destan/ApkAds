<!DOCTYPE html>
<html>

    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: transparent; 
        }

            width: 100%;
            height: 100vh;
            display: flex;

        img {
            width: 100%;

</head>
